<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylesheets/stylesheet.css">
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round">
      <circle cx="8" cy="8" r="6"/>
      <path d="M5.5 8h5M8 5.5v5"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Local AI Assistant</h1>
    <p>offline · your html files only</p>
  </div>
  <div class="status-dot" title="Model running locally"></div>
</header>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="4" y="8" width="32" height="24" rx="4"/>
      <path d="M13 18h14M13 24h8"/>
    </svg>
    <p>Ask anything about your documents. All answers come from your local HTML files.</p>
    <small>100% offline · no data leaves your machine</small>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea
      id="user-input"
      placeholder="Ask a question about your documents…"
      rows="1"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 7h10M7 2l5 5-5 5"/>
      </svg>
    </button>
  </div>
</footer>

<script>
  const chatWindow = document.getElementById('chat-window');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  const API_URL = 'http://localhost:8000/chat';

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  input.addEventListener('input', autoResize);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function appendMessage(role, content, sources = []) {
    if (emptyState) emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'AI' : 'you';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    if (sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      srcDiv.innerHTML = '<span class="source-label">sources:</span>';
      sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = s.split('/').pop();
        srcDiv.appendChild(tag);
      });
      bubble.appendChild(srcDiv);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function appendTyping() {
    if (emptyState) emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  function appendError(msg) {
    if (emptyState) emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = msg;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    const typingEl = appendTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      typingEl.remove();

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const data = await res.json();
      appendMessage('ai', data.answer, data.sources || []);
    } catch (err) {
      typingEl.remove();
      if (err.message.includes('fetch')) {
        appendError('Cannot reach server. Is `uvicorn server:app` running on port 8000?');
      } else {
        appendError('Error: ' + err.message);
      }
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
