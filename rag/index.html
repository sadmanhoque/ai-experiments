<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2127;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e9ec;
    --muted: #6b7280;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent-border: rgba(74,222,128,0.3);
    --user-bg: #1e2127;
    --ai-bg: #13151a;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo svg { width: 16px; height: 16px; }

  .header-text h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: auto;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  #chat-window::-webkit-scrollbar { width: 5px; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 820px;
    width: 100%;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: var(--mono);
  }

  .avatar.ai {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--accent);
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    max-width: calc(100% - 44px);
  }

  .message.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 3px;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--border2);
    color: var(--text);
    border-top-right-radius: 3px;
  }

  .sources {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .source-label { color: var(--muted); margin-right: 2px; }

  .source-tag {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }

  .empty-state svg { width: 40px; height: 40px; opacity: 0.3; }

  .empty-state p { font-size: 14px; max-width: 300px; line-height: 1.6; }

  .empty-state small {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    padding: 4px 12px;
    border-radius: 20px;
  }

  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent-border); }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
    resize: none;
    max-height: 140px;
    min-height: 22px;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 32px; height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    color: var(--accent);
  }

  #send-btn:hover { background: rgba(74,222,128,0.2); }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #send-btn svg { width: 14px; height: 14px; }

  .error-bubble {
    color: #f87171;
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round">
      <circle cx="8" cy="8" r="6"/>
      <path d="M5.5 8h5M8 5.5v5"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Local AI Assistant</h1>
    <p>offline · your html files only</p>
  </div>
  <div class="status-dot" title="Model running locally"></div>
</header>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="4" y="8" width="32" height="24" rx="4"/>
      <path d="M13 18h14M13 24h8"/>
    </svg>
    <p>Ask anything about your documents. All answers come from your local HTML files.</p>
    <small>100% offline · no data leaves your machine</small>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea
      id="user-input"
      placeholder="Ask a question about your documents…"
      rows="1"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 7h10M7 2l5 5-5 5"/>
      </svg>
    </button>
  </div>
</footer>

<script>
  const chatWindow = document.getElementById('chat-window');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  const API_URL = 'http://localhost:8000/chat';

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  input.addEventListener('input', autoResize);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function appendMessage(role, content, sources = []) {
    if (emptyState) emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'AI' : 'you';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    if (sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      srcDiv.innerHTML = '<span class="source-label">sources:</span>';
      sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = s.split('/').pop();
        srcDiv.appendChild(tag);
      });
      bubble.appendChild(srcDiv);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function appendTyping() {
    if (emptyState) emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  function appendError(msg) {
    if (emptyState) emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = msg;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    const typingEl = appendTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      typingEl.remove();

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const data = await res.json();
      appendMessage('ai', data.answer, data.sources || []);
    } catch (err) {
      typingEl.remove();
      if (err.message.includes('fetch')) {
        appendError('Cannot reach server. Is `uvicorn server:app` running on port 8000?');
      } else {
        appendError('Error: ' + err.message);
      }
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
